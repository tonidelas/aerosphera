<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script type="text/javascript">
      // Only redirect if not already at /aerofy
      (function() {
        var pathname = window.location.pathname;
        var repo = '/aerofy';
        // If not already at /aerofy, redirect
        if (!pathname.startsWith(repo)) {
          window.location.replace(repo + pathname + window.location.search + window.location.hash);
        }
      })();
    </script>
  </head>
  <body>
    Redirecting...
  </body>
</html>
